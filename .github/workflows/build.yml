name: Build RuleSet

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Rules Directory
        run: mkdir -p rules

      - name: Generate AI RuleSet
        run: |
          cat source/AI.txt \
          | sed '/^$/d' \
          | sort -u \
          | awk '{print "DOMAIN-SUFFIX,"$0}' \
          > rules/AI.list

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add rules

          git diff --staged --quiet || \
          git commit -m "Auto Update Rules"

      - name: Push
        run: git push