name: Build RuleSet

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

- name: Generate RuleSets
  run: |
    mkdir -p rules

    for file in source/*.txt
    do
      name=$(basename "$file" .txt)

      cat "$file" \
      | sed '/^$/d' \
      | sort -u \
      | awk '{print "DOMAIN-SUFFIX,"$0}' \
      > "rules/${name}.list"

      echo "Generated rules/${name}.list"
    done
      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add rules

          git diff --staged --quiet || \
          git commit -m "Auto Update Rules"

      - name: Push
        run: git push